# ─── Prefix Key ───────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
set -g prefix2 C-b

# ─── General Settings ─────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# ─── Clear Screen (Ctrl+ø via Alacritty) ─────────────────────
set -s user-keys[0] "\e[99;5~"
bind -n User0 send-keys C-l

# ─── Config Reload ────────────────────────────────────────────
bind q source-file ~/.config/tmux/tmux.conf \; display "Configuration reloaded"

# ─── Vi Mode for Copy ────────────────────────────────────────
setw -g mode-keys vi
bind w copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ─── Pane Controls ────────────────────────────────────────────
# Splits
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Kill pane / window
bind z kill-pane
bind Z kill-window

# Seamless Ctrl+hjkl navigation (vim-tmux-navigator)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Pane resize: prefix + Shift vim keys (preserved from personal config)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Window Navigation ───────────────────────────────────────
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
# Right Option + number to select pane (1-5)
bind -n M-1 select-pane -t 1
bind -n M-2 select-pane -t 2
bind -n M-3 select-pane -t 3
bind -n M-4 select-pane -t 4
bind -n M-5 select-pane -t 5
# Prefix + number to select window (1-6)
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6

# Prefix + Left/Right to move between windows
bind Left  previous-window
bind Right next-window

# ─── Session Management ──────────────────────────────────────
bind C new-session -c "#{pane_current_path}"
bind Q kill-session
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind N switch-client -n
bind P switch-client -p

# Prefix + Up/Down to move between sessions
bind Up   switch-client -p
bind Down switch-client -n

# ─── Status Bar ───────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-left-length 30
set -g status-right "#[fg=blue]#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g status-right-length 50
set -g status-justify left

# Window status
setw -g window-status-format "#[fg=brightblack] #I:#W "
setw -g window-status-current-format "#[fg=blue,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"

# Message styling
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue


