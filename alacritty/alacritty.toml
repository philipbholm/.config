[general]
live_config_reload = true
ipc_socket = true

import = ["~/.config/alacritty/active_theme.toml"]

[colors]
draw_bold_text_with_bright_colors = true

[cursor.style]
blinking = "Off"
shape = "Block"

[env]
TERM = "xterm-256color"

[font]
size = 16

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.glyph_offset]
x = 0
y = 0

[font.italic]
family = "JetBrainsMono Nerd Font"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.offset]
x = 0
y = 0

[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"

[window]
option_as_alt = "OnlyRight"

[window.dimensions]
columns = 160
lines = 80

[window.padding]
x = 4
y = 4

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[[keyboard.bindings]]
key = "ø"
mods = "Control"
chars = "\u001b[99;5~"

