model = "gpt-5.4"
model_reasoning_effort = "medium"
personality = "pragmatic"
[projects."/Users/philip/work/ledidi-monorepo"]
trust_level = "trusted"

[projects."/Users/philip/.config"]
trust_level = "trusted"

[projects."/Users/philip/work/legacy"]
